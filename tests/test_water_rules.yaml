# =============================================================================
# NSW Water OpenFisca Package — YAML Tests
#
# These tests verify that the encoded rules produce the correct outcomes
# for known scenarios. Each test describes a situation and asserts the
# expected output variable values.
#
# Run with:  make test
#            or: openfisca test tests/ --country-package openfisca_nsw_water
#
# Reference: OpenFisca documentation — Writing YAML tests
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# METERING TESTS
# Reference: Water Management Act 2000 s.101A;
#            Water Management (General) Regulation 2025, Part 5 (cl. 66-116)
#            Water Management (General) Regulation 2025, Schedule 7
#
# The 2025 Regulation introduced a dual-axis framework. Obligations are
# determined by BOTH cumulative entitlement (ML) AND pump/bore diameter (mm).
#
# Tier 3 (full compliance — AS4747 meter + DQP + LID + telemetry):
#   - Surface water pump ≥500mm (anywhere in NSW), OR
#   - Cumulative entitlement ≥100ML
#
# Tier 2 (meter only — DQP and telemetry optional):
#   - Cumulative entitlement >15ML and <100ML
#
# Exempt (no meter required):
#   - Single surface water pump <100mm AND entitlement ≤15ML, OR
#   - Single groundwater bore <200mm AND entitlement ≤15ML
#   - Note: trading allocations overrides the ≤15ML exemption
#
# Not applicable:
#   - No water access licence, OR
#   - Work is inactive or unintended
# ─────────────────────────────────────────────────────────────────────────────

- name: >
    Metering — Tier 3 (inland). Large inland pump (300mm), 250ML entitlement.
    Requires full compliance: AS4747 meter + DQP + LID/telemetry.
    Inland deadline already passed — compliance required now (2024).
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 300.0
        cumulative_entitlement_ml: 250.0
        water_region: inland_regulated
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_3_full_compliance
        metering_required: true
        telemetry_required: true
        dqp_validation_required: true
        compliance_deadline_year: 2024
        metering_compliance_status: "action_required"

- name: >
    Metering — Tier 3 (inland), pattern-approved meter WITH LID already installed.
    Should be fully compliant.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 300.0
        cumulative_entitlement_ml: 250.0
        water_region: inland_regulated
        current_meter_status: pattern_approved_with_lid
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_3_full_compliance
        metering_required: true
        telemetry_required: true
        dqp_validation_required: true
        compliance_deadline_year: 2024
        metering_compliance_status: "compliant"

- name: >
    Metering — Tier 3 (inland), pattern-approved meter installed but NO LID.
    Meter is present but telemetry gap means not fully compliant.
    Status: lid_required.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 300.0
        cumulative_entitlement_ml: 120.0
        water_region: inland_regulated
        current_meter_status: pattern_approved_no_lid
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_3_full_compliance
        metering_required: true
        telemetry_required: true
        dqp_validation_required: true
        compliance_deadline_year: 2024
        metering_compliance_status: "lid_required"

- name: >
    Metering — Tier 3 high-risk pump (≥500mm). 500mm pump, entitlement only 30ML.
    Pump diameter alone triggers Tier 3 regardless of entitlement.
    Applies everywhere in NSW — deadline already passed (inland and coastal).
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 500.0
        cumulative_entitlement_ml: 30.0
        water_region: coastal
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_3_full_compliance
        metering_required: true
        telemetry_required: true
        dqp_validation_required: true
        metering_compliance_status: "action_required"

- name: >
    Metering — Tier 3 (coastal). 150ML entitlement, 200mm pump, coastal region.
    Full compliance required. Coastal deadline: 1 December 2026.
    Old non-approved meter in place — must upgrade.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 200.0
        cumulative_entitlement_ml: 150.0
        water_region: coastal
        current_meter_status: non_approved
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_3_full_compliance
        metering_required: true
        telemetry_required: true
        dqp_validation_required: true
        compliance_deadline_year: 2026
        metering_compliance_status: "upgrade_required"

- name: >
    Metering — Tier 2. 60ML entitlement, 150mm pump, inland regulated river.
    Pattern-approved meter required. DQP and telemetry optional.
    Deadline: 1 December 2027.
    No meter installed — action required.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 150.0
        cumulative_entitlement_ml: 60.0
        water_region: inland_regulated
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_2_meter_only
        metering_required: true
        telemetry_required: false
        dqp_validation_required: false
        compliance_deadline_year: 2027
        metering_compliance_status: "action_required"

- name: >
    Metering — Tier 2, pattern-approved meter installed (no LID).
    LID is optional at Tier 2 — meter alone satisfies the obligation.
    Status: compliant.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 150.0
        cumulative_entitlement_ml: 60.0
        water_region: inland_regulated
        current_meter_status: pattern_approved_no_lid
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_2_meter_only
        metering_required: true
        telemetry_required: false
        dqp_validation_required: false
        compliance_deadline_year: 2027
        metering_compliance_status: "compliant"

- name: >
    Metering — Exempt. Single surface water pump 80mm, entitlement 10ML.
    Below both size threshold (<100mm) and volume threshold (≤15ML).
    No meter required. Note: recording and reporting still mandatory.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 80.0
        cumulative_entitlement_ml: 10.0
        water_region: coastal
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: exempt
        metering_required: false
        telemetry_required: false
        dqp_validation_required: false
        compliance_deadline_year: 0
        metering_compliance_status: "exempt"

- name: >
    Metering — Low volume exemption overridden by trading allocations.
    12ML entitlement (≤15ML) but licence holder is trading allocations.
    Trading triggers mandatory metering despite low volume.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 80.0
        cumulative_entitlement_ml: 12.0
        water_region: inland_regulated
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: true
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: tier_2_meter_only
        metering_required: true
        telemetry_required: false
        metering_compliance_status: "action_required"

- name: >
    Metering — Groundwater licence, single bore 180mm, 8ML entitlement.
    Below groundwater bore size threshold (<200mm) and volume threshold (≤15ML).
    Exempt from metering.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: groundwater
        pump_diameter_mm: 180.0
        cumulative_entitlement_ml: 8.0
        water_region: inland_unregulated
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: exempt
        metering_required: false
        telemetry_required: false
        dqp_validation_required: false
        metering_compliance_status: "exempt"

- name: >
    Metering — Inactive works. Large pump, large entitlement, but work is inactive.
    Inactive works are exempt from metering obligations under Schedule 7, Part 3.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: surface_water
        pump_diameter_mm: 300.0
        cumulative_entitlement_ml: 200.0
        water_region: inland_regulated
        current_meter_status: none
        work_status: inactive
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: not_applicable
        metering_required: false
        telemetry_required: false
        dqp_validation_required: false
        metering_compliance_status: "not_applicable"

- name: >
    Metering — No water access licence held.
    Metering rules do not apply regardless of pump size or entitlement.
  period: 2025
  input:
    water_licences:
      licence_holder_1:
        licence_type: none
        pump_diameter_mm: 300.0
        cumulative_entitlement_ml: 0.0
        water_region: coastal
        current_meter_status: none
        work_status: active
        is_single_work_on_property: true
        is_trading_allocations: false
  output:
    water_licences:
      licence_holder_1:
        compliance_tier: not_applicable
        metering_required: false
        telemetry_required: false
        dqp_validation_required: false
        metering_compliance_status: "not_applicable"


# ─────────────────────────────────────────────────────────────────────────────
# CONTROLLED ACTIVITY TESTS
# Reference: Water Management Act 2000 s.91;
#            Water Management (General) Regulation 2018 Schedule 3
# ─────────────────────────────────────────────────────────────────────────────

- name: >
    CAA — Structure proposed within 40m of a river, no exemption applies.
    CAA is required.
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: within_40m_river
        activity_type: erect_structure
        special_circumstance: none
        activity_purpose: agricultural
  output:
    controlled_activity_applications:
      application_1:
        is_on_waterfront_land: true
        caa_exemption_applies: false
        caa_required: true
        caa_outcome_code: "caa_required"

- name: >
    CAA — Activity located more than 40m from any waterway.
    Not waterfront land — no CAA required.
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: outside_waterfront
        activity_type: erect_structure
        special_circumstance: none
        activity_purpose: residential
  output:
    controlled_activity_applications:
      application_1:
        is_on_waterfront_land: false
        caa_exemption_applies: true
        caa_required: false
        caa_outcome_code: "not_waterfront"

- name: >
    CAA — Emergency flood repair on waterfront land.
    Emergency exemption applies — no CAA required (but notify NRAR within 7 days).
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: within_40m_river
        activity_type: maintenance
        special_circumstance: emergency
        activity_purpose: agricultural
  output:
    controlled_activity_applications:
      application_1:
        is_on_waterfront_land: true
        emergency_exemption_applies: true
        caa_exemption_applies: true
        caa_required: false
        caa_outcome_code: "emergency_exempt"

- name: >
    CAA — Routine maintenance of existing lawfully approved structure.
    Maintenance exemption applies — no CAA required.
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: within_40m_river
        activity_type: maintenance
        special_circumstance: none
        activity_purpose: agricultural
  output:
    controlled_activity_applications:
      application_1:
        maintenance_exemption_applies: true
        caa_exemption_applies: true
        caa_required: false
        caa_outcome_code: "maintenance_exempt"

- name: >
    CAA — Location unknown. Conservative result — CAA flagged as required
    until distance from waterway is confirmed.
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: unknown
        activity_type: fill_excavate
        special_circumstance: none
        activity_purpose: commercial
  output:
    controlled_activity_applications:
      application_1:
        is_on_waterfront_land: true
        caa_required: true
        caa_outcome_code: "location_unknown"

- name: >
    CAA — Vegetation clearing within 40m of estuary, not emergency.
    CAA required.
  period: 2024
  input:
    controlled_activity_applications:
      application_1:
        activity_location: within_40m_estuary
        activity_type: vegetation_clearing
        special_circumstance: none
        activity_purpose: commercial
  output:
    controlled_activity_applications:
      application_1:
        is_on_waterfront_land: true
        caa_exemption_applies: false
        caa_required: true
        caa_outcome_code: "caa_required"


# ─────────────────────────────────────────────────────────────────────────────
# HARVESTABLE RIGHTS TESTS
# Reference: Water Management Act 2000 s.52;
#            Water Management (General) Regulation 2018 cl. 43-48
# ─────────────────────────────────────────────────────────────────────────────

- name: >
    Harvestable rights — 100 hectare property in medium rainfall zone (600-800mm).
    No existing dams. Expected capacity: 100 × 5.0 = 500.0 ML
  period: 2024
  input:
    land_holdings:
      holding_1:
        land_area_hectares: 100
        rainfall_zone: medium
        catchment_type: unregulated
        existing_dam_volume_ml: 0
  output:
    land_holdings:
      holding_1:
        harvestable_rights_factor: 5.0
        maximum_harvestable_dam_capacity_ml: 500.0
        remaining_dam_capacity_ml: 500.0
        regulated_river_restriction_applies: false

- name: >
    Harvestable rights — 63.26 hectare property in low rainfall zone (400-600mm).
    No existing dams. Expected: 63.26 × 3.5 = 221.41 ML
  period: 2024
  input:
    land_holdings:
      holding_1:
        land_area_hectares: 63.26
        rainfall_zone: low
        catchment_type: unregulated
        existing_dam_volume_ml: 0
  output:
    land_holdings:
      holding_1:
        harvestable_rights_factor: 3.5
        maximum_harvestable_dam_capacity_ml: 221.41
        remaining_dam_capacity_ml: 221.41

- name: >
    Harvestable rights — 200 hectare property in high rainfall zone (800-1000mm).
    Existing dams total 150 ML. Remaining: (200 × 6.2) - 150 = 1090.0 ML
  period: 2024
  input:
    land_holdings:
      holding_1:
        land_area_hectares: 200
        rainfall_zone: high
        catchment_type: unregulated
        existing_dam_volume_ml: 150
  output:
    land_holdings:
      holding_1:
        harvestable_rights_factor: 6.2
        maximum_harvestable_dam_capacity_ml: 1240.0
        remaining_dam_capacity_ml: 1090.0

- name: >
    Harvestable rights — Property within 3km of a regulated river.
    Additional restrictions flag should be raised.
  period: 2024
  input:
    land_holdings:
      holding_1:
        land_area_hectares: 150
        rainfall_zone: medium
        catchment_type: within_3km_regulated
        existing_dam_volume_ml: 0
  output:
    land_holdings:
      holding_1:
        maximum_harvestable_dam_capacity_ml: 750.0
        regulated_river_restriction_applies: true

- name: >
    Harvestable rights — Very high rainfall zone (>1000mm), 50 hectares.
    Expected: 50 × 7.2 = 360.0 ML
  period: 2024
  input:
    land_holdings:
      holding_1:
        land_area_hectares: 50
        rainfall_zone: very_high
        catchment_type: unregulated
        existing_dam_volume_ml: 0
  output:
    land_holdings:
      holding_1:
        harvestable_rights_factor: 7.2
        maximum_harvestable_dam_capacity_ml: 360.0
        remaining_dam_capacity_ml: 360.0
